name: kitchengpt
description: AI-powered food analysis, recipe discovery, and nearby restaurant search.
publish_to: "none"
version: 0.4.1+16

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
